<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Todo App</h1>
    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="What needs to be done?" required>
      <button type="submit">Add</button>
    </form>
    <div id="filters">
      <select id="status-filter">
        <option value="all">All</option>
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
      </select>
      <input type="text" id="search-input" placeholder="Search todos...">
    </div>
    <ul id="todo-list"></ul>
    <p id="empty-message" style="display:none;">No todos match your current filter.</p>
  </div>
  <script src="app.js"></script>
</body>
</html>
