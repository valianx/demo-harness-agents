<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Todo App</h1>
    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="What needs to be done?" required>
      <button type="submit">Add</button>
    </form>
    <div class="filter-bar">
      <div class="status-buttons">
        <button class="status-btn active" data-status="all">All</button>
        <button class="status-btn" data-status="active">Active</button>
        <button class="status-btn" data-status="completed">Completed</button>
      </div>
      <input type="text" id="filter-input" placeholder="Search todos...">
    </div>
    <ul id="todo-list"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
